name: Verify live mobile CTA V2

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  verify-live:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Wait for production mobile CTA runtime
        run: |
          set -euo pipefail
          verified=0
          for attempt in $(seq 1 30); do
            curl -fsSL --max-time 20 "https://alinahorb.com/assets/js/site.v2.js?v=mobile-cta-v2-${attempt}" -o /tmp/site-v2.js || true
            curl -fsSL --max-time 20 "https://alinahorb.com/about/?v=mobile-cta-v2-${attempt}" -o /tmp/about-ua.html || true
            curl -fsSL --max-time 20 "https://alinahorb.com/ru/about/?v=mobile-cta-v2-${attempt}" -o /tmp/about-ru.html || true
            if grep -Fq 'width: "min(280px, calc(100% - 32px))"' /tmp/site-v2.js \
              && grep -Fq 'autoHideTimer' /tmp/site-v2.js \
              && grep -Fq 'if (delta > 3) setVisible(false);' /tmp/site-v2.js \
              && grep -Fq 'window.visualViewport?.addEventListener("resize", requestUpdate);' /tmp/site-v2.js \
              && grep -Fq 'data-mobile-booking-cta' /tmp/about-ua.html \
              && grep -Fq 'data-mobile-booking-cta' /tmp/about-ru.html; then
              verified=1
              echo "Live mobile CTA V2 verified on attempt ${attempt}."
              break
            fi
            echo "Attempt ${attempt}: production runtime not visible yet"
            sleep 15
          done
          test "$verified" -eq 1

      - name: Remove temporary verifier
        run: |
          set -euo pipefail
          rm -f .github/workflows/verify-live-mobile-cta-v2.yml
          rm -f .tmp/verify-live-mobile-cta-v2.txt
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Confirm live mobile CTA V2'
          git push origin HEAD:main
