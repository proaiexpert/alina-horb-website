name: Fix Russian consultations form parity

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  fix:
    if: github.head_ref == 'fix/ru-consultations-form-parity' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fix branch
        uses: actions/checkout@v4
        with:
          ref: fix/ru-consultations-form-parity
          fetch-depth: 0

      - name: Apply focused parity fix
        run: |
          set -euo pipefail
          python3 scripts/fix-ru-consultations-form-parity.py
          python3 scripts/validate-consultations-pages-v1.py
          node --check assets/js/site.v2.js
          grep -Fq 'name="service"' ru/consultations/index.html
          grep -Fq 'name="timezone"' ru/consultations/index.html
          grep -Fq 'name="availability"' ru/consultations/index.html

      - name: Commit clean fix
        run: |
          set -euo pipefail
          rm scripts/fix-ru-consultations-form-parity.py
          rm .github/workflows/fix-ru-consultations-form-parity.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Align Russian consultations form with Ukrainian page"
          git push origin HEAD:fix/ru-consultations-form-parity
