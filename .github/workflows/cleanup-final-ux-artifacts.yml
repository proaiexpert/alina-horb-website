name: Cleanup final UX review artifacts

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/cleanup-final-ux-artifacts.yml'

permissions:
  contents: write

jobs:
  cleanup:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Remove committed review artifacts and cleanup workflow
        run: |
          rm -rf qa/final-ux
          rm .github/workflows/cleanup-final-ux-artifacts.yml

      - name: Commit clean production branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Remove temporary final UX review artifacts"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
