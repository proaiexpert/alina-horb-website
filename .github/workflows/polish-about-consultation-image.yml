name: Polish About consultation image presentation

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  polish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Apply restrained premium image treatment
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          css_path = Path('assets/css/site.about.v1.css')
          css = css_path.read_text(encoding='utf-8')
          marker = '/* Consultation-space image final polish v1. */'
          if marker not in css:
              css += r'''

/* Consultation-space image final polish v1. */
.profile-editorial-figure {
  width: min(100%, 700px);
  justify-self: end;
}

.profile-editorial-figure img {
  height: auto;
  aspect-ratio: 4 / 3;
  object-position: center center;
  border: 1px solid rgba(47, 48, 45, .08);
  box-shadow: 0 22px 54px rgba(47, 48, 45, .095);
}

@media (max-width: 900px) {
  .profile-editorial-figure {
    width: min(100%, 700px);
    justify-self: center;
  }
}

@media (max-width: 620px) {
  .profile-editorial-layout { gap: 32px; }

  .profile-editorial-figure {
    width: 100%;
  }

  .profile-editorial-figure img {
    width: 100%;
    height: auto;
    max-height: none;
    aspect-ratio: 4 / 3;
    object-fit: cover;
    object-position: center center;
    border-radius: 20px;
    box-shadow: 0 18px 42px rgba(47, 48, 45, .09);
  }

  .profile-editorial-figure figcaption {
    max-width: 34rem;
    margin-top: 12px;
    font-size: 14px;
    line-height: 1.55;
  }
}
'''
              css_path.write_text(css, encoding='utf-8')
          PY

          test -s assets/images/about/alina-horb-consultation-space-v1.webp
          file assets/images/about/alina-horb-consultation-space-v1.webp | grep -Fq 'Web/P image'
          grep -Fq 'alina-horb-consultation-space-v1.webp' about/index.html
          grep -Fq 'alina-horb-consultation-space-v1.webp' ru/about/index.html
          python3 scripts/validate-about-pages-v1.py
          python3 scripts/validate-v3-2-forms.py
          python3 scripts/validate-notes-editorial-images.py

      - name: Commit clean polish
        run: |
          set -euo pipefail
          rm .github/workflows/polish-about-consultation-image.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/css/site.about.v1.css .github/workflows/polish-about-consultation-image.yml
          git commit -m "Polish consultation image presentation on About pages"
          git push origin HEAD:main
