name: Apply editorial navigation V1

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-validate-clean:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Apply navigation integration
        run: python3 scripts/apply-editorial-navigation-v1.py

      - name: Validate navigation and existing pages
        run: |
          set -euo pipefail
          python3 scripts/validate-editorial-navigation-v1.py
          python3 scripts/validate-about-pages-v1.py
          python3 scripts/validate-consultations-pages-v1.py
          node --check assets/js/site.v2.js
          node --check assets/js/site.chrome.v3.js
          node --check assets/js/site.navigation.v1.js
          grep -Fq 'Розділи сайту' assets/js/site.navigation.v1.js
          grep -Fq 'Разделы сайта' assets/js/site.navigation.v1.js
          grep -Fq '.editorial-mobile-menu:not([hidden])' assets/css/site.navigation.v1.css

      - name: Commit integrated files and remove temporary machinery
        run: |
          set -euo pipefail
          rm -f .github/workflows/apply-editorial-navigation-v1.yml
          rm -f scripts/apply-editorial-navigation-v1.py
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Integrate premium two-level editorial navigation'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
