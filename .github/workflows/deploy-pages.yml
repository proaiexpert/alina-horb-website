name: Deploy Alina Horb website

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare public site artifact
        shell: bash
        run: |
          set -euo pipefail

          rm -rf _site
          mkdir -p _site

          cp index.html _site/
          cp -R ru _site/
          cp -R assets _site/

          touch _site/.nojekyll

          # The portrait WebP is not present in the repository and some mobile
          # browsers keep the selected <source> instead of falling back after
          # an image error. Use the confirmed JPEG assets for both portrait and
          # diploma in the deployed preview.
          python3 - <<'PY'
          from pathlib import Path
          import re

          for page in (Path("_site/index.html"), Path("_site/ru/index.html")):
              html = page.read_text(encoding="utf-8")
              html = re.sub(
                  r'\n\s*<source\s+srcset="[^"]*(?:alina-horb-portrait-hero|alina-horb-diploma-public-1600)\.webp"\s+type="image/webp">',
                  '',
                  html,
              )
              html = html.replace(
                  'alina-horb-portrait-hero.webp" type="image/webp"',
                  'alina-horb-portrait-hero.jpg"',
              )
              page.write_text(html, encoding="utf-8")
          PY

          test -f _site/index.html
          test -f _site/ru/index.html
          test -f _site/assets/images/portrait/alina-horb-portrait-hero.jpg
          test -f _site/assets/images/diploma/alina-horb-diploma-public-1600.jpg

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
