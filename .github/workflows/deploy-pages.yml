name: Deploy Alina Horb website

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate production site contract
        run: |
          python3 scripts/validate-assets.py
          python3 scripts/validate-social-previews.py
          python3 scripts/validate-public-email.py
          python3 scripts/validate-privacy-intake.py
          python3 scripts/validate-article-v32.py
          python3 scripts/validate-article-start-conversation.py
          python3 scripts/validate-article-coping-support.py

      - name: Prepare public site artifact
        shell: bash
        run: |
          set -euo pipefail

          rm -rf _site
          mkdir -p _site

          cp index.html _site/
          cp favicon.svg _site/
          cp -R assets _site/
          cp -R notes _site/
          cp -R privacy _site/
          cp -R ru _site/

          touch _site/.nojekyll

          test -f _site/index.html
          test -f _site/favicon.svg
          test -f _site/notes/index.html
          test -f _site/notes/first-consultation/index.html
          test -f _site/notes/how-to-start-the-conversation/index.html
          test -f _site/notes/when-coping-stops-helping/index.html
          test -f _site/privacy/index.html
          test -f _site/ru/index.html
          test -f _site/ru/notes/index.html
          test -f _site/ru/notes/first-consultation/index.html
          test -f _site/ru/notes/how-to-start-the-conversation/index.html
          test -f _site/ru/notes/when-coping-stops-helping/index.html
          test -f _site/ru/privacy/index.html

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
