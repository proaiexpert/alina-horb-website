name: Deploy Alina Horb website

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply and commit result-focused bilingual copy
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/apply-result-focused-copy-v1.py
          python3 scripts/validate-about-pages-v1.py
          python3 scripts/validate-consultations-pages-v1.py
          python3 scripts/validate-release-readiness.py
          node --check assets/js/site.v2.js
          grep -Fq 'Работа с ясной целью и вниманием к результату' ru/about/index.html
          grep -Fq 'Робота з чіткою метою та увагою до результату' about/index.html
          grep -Fq 'Ориентация на результат' ru/index.html
          grep -Fq 'Орієнтація на результат' index.html
          grep -Fq 'Ориентация на результат' ru/consultations/index.html
          grep -Fq 'Орієнтація на результат' consultations/index.html
          git show HEAD^:.github/workflows/deploy-pages.yml > /tmp/deploy-pages.yml
          cp /tmp/deploy-pages.yml .github/workflows/deploy-pages.yml
          rm -f .github/workflows/apply-result-focused-copy-v1.yml
          rm -f scripts/apply-result-focused-copy-v1.py
          rm -f .tmp/result-copy-trigger.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Reframe professional responsibility around measurable progress"
          git push origin HEAD:main

      - name: Build static Notes imagery
        run: |
          python3 scripts/apply-notes-images-v3-1.py
          python3 scripts/patch-notes-validator-expectations-v3-1.py
          node --check assets/js/site.notes-images.v3-1.js
          python3 scripts/validate-notes-images-v3-1.py

      - name: Build production form runtime
        run: |
          python3 scripts/apply-turnstile-v3-2.py
          node --check assets/js/site.v2.js

      - name: Enable production indexing
        run: python3 scripts/apply-indexing-launch-v3-2.py

      - name: Build localized social previews and favicon fallbacks
        run: python3 scripts/apply-social-favicon-v3-3.py

      - name: Validate production site contract
        run: |
          python3 scripts/validate-assets.py
          python3 scripts/validate-about-pages-v1.py
          python3 scripts/validate-consultations-pages-v1.py
          python3 scripts/validate-social-previews.py
          python3 scripts/validate-favicon-social-v3-3.py
          python3 scripts/validate-public-email.py
          python3 scripts/validate-privacy-intake.py
          python3 scripts/validate-form-hardening.py
          python3 scripts/validate-notes-images-v3.py
          python3 scripts/validate-notes-images-v3-1.py
          python3 scripts/validate-article-v32.py
          python3 scripts/validate-article-start-conversation.py
          python3 scripts/validate-article-coping-support.py
          python3 scripts/validate-article-relocation.py
          python3 scripts/validate-notes-hub-v32.py
          python3 scripts/validate-release-readiness.py

      - name: Prepare public site artifact
        shell: bash
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site
          cp index.html _site/
          cp favicon.svg _site/
          cp favicon.ico _site/
          cp favicon-16x16.png _site/
          cp favicon-32x32.png _site/
          cp robots.txt _site/
          cp sitemap.xml _site/
          cp -R assets _site/
          cp -R about _site/
          cp -R consultations _site/
          cp -R notes _site/
          cp -R privacy _site/
          cp -R ru _site/
          touch _site/.nojekyll
          test -f _site/index.html
          test -f _site/favicon.svg
          test -f _site/favicon.ico
          test -f _site/favicon-16x16.png
          test -f _site/favicon-32x32.png
          test -f _site/robots.txt
          test -f _site/sitemap.xml
          test -f _site/assets/css/site.notes-hub.v3-2.css
          test -f _site/assets/css/site.about.v1.css
          test -f _site/assets/css/site.consultations.v1.css
          test -f _site/assets/css/site.notes-images.v3.css
          test -f _site/assets/js/site.notes-images.v3-1.js
          test -f _site/assets/images/social/alina-horb-og-ua-v2.jpg
          test -f _site/assets/images/social/alina-horb-og-ru-v2.jpg
          test -f _site/assets/images/notes/alina-horb-note-first-consultation-v3.webp
          test -f _site/assets/images/notes/alina-horb-note-conversation-v3.webp
          test -f _site/assets/images/notes/alina-horb-note-observation-v3.webp
          test -f _site/assets/images/notes/alina-horb-note-transition-v3.webp
          test -f _site/about/index.html
          test -f _site/consultations/index.html
          test -f _site/notes/index.html
          test -f _site/notes/first-consultation/index.html
          test -f _site/notes/how-to-start-the-conversation/index.html
          test -f _site/notes/when-coping-stops-helping/index.html
          test -f _site/notes/stress-relocation-and-lost-support/index.html
          test -f _site/privacy/index.html
          test -f _site/ru/index.html
          test -f _site/ru/about/index.html
          test -f _site/ru/consultations/index.html
          test -f _site/ru/notes/index.html
          test -f _site/ru/notes/first-consultation/index.html
          test -f _site/ru/notes/how-to-start-the-conversation/index.html
          test -f _site/ru/notes/when-coping-stops-helping/index.html
          test -f _site/ru/notes/stress-relocation-and-lost-support/index.html
          test -f _site/ru/privacy/index.html
          grep -q 'content="index, follow, max-image-preview:large"' _site/index.html
          grep -q 'content="index, follow, max-image-preview:large"' _site/ru/index.html
          grep -q 'content="index, follow, max-image-preview:large"' _site/about/index.html
          grep -q 'content="index, follow, max-image-preview:large"' _site/ru/about/index.html
          grep -q 'content="index, follow, max-image-preview:large"' _site/consultations/index.html
          grep -q 'content="index, follow, max-image-preview:large"' _site/ru/consultations/index.html
          grep -q 'alina-horb-og-ua-v2.jpg' _site/index.html
          grep -q 'alina-horb-og-ru-v2.jpg' _site/ru/index.html
          grep -q 'href="/favicon.ico"' _site/index.html
          grep -q 'href="/favicon.ico"' _site/ru/index.html
          grep -q 'href="/favicon.ico"' _site/about/index.html
          grep -q 'href="/favicon.ico"' _site/ru/about/index.html

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
