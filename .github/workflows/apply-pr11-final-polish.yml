name: Apply PR 11 final visual polish

on:
  push:
    branches:
      - review/pr11-visual-qa

permissions:
  contents: write

jobs:
  polish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout review tools
        uses: actions/checkout@v4
        with:
          ref: review/pr11-visual-qa
          path: review-tools

      - name: Checkout PR 11 branch
        uses: actions/checkout@v4
        with:
          ref: feature/premium-editorial-v2
          fetch-depth: 0
          path: site

      - name: Apply final polish
        run: python3 review-tools/scripts/polish-pr11-final.py site

      - name: Validate assets
        working-directory: site
        run: python3 scripts/validate-assets.py

      - name: Commit and push to PR 11
        working-directory: site
        run: |
          git config user.name "OpenAI Review Bot"
          git config user.email "review-bot@users.noreply.github.com"
          if git diff --quiet; then
            echo "No changes required"
            exit 0
          fi
          git add assets/css/site.v2.css
          git commit -m "Polish portrait framing and navigation readability"
          git push origin HEAD:feature/premium-editorial-v2
