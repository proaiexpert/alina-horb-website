name: Apply post-refactor tail cleanup V1

on:
  push:
    branches:
      - feature/post-refactor-tail-audit-v1
    paths:
      - 'scripts/apply-post-refactor-tail-cleanup-v1.py'
      - '.github/workflows/apply-post-refactor-tail-cleanup-v1.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/post-refactor-tail-audit-v1
          fetch-depth: 0

      - name: Apply confirmed tail cleanup
        run: python3 scripts/apply-post-refactor-tail-cleanup-v1.py

      - name: Validate patched Python and YAML references
        run: |
          python3 -m py_compile scripts/audit-post-refactor-tails-v1.py scripts/validate-global-chrome-v1.py
          ! git grep -n -F 'node --check assets/js/site.global-chrome.v1.js' -- .github/workflows
          ! git grep -n -F 'node --check assets/js/site.chrome.v3.js' -- .github/workflows
          ! git grep -n -F 'node --check assets/js/site.notes-images.v3-1.js' -- .github/workflows
          test ! -e assets/js/site.global-chrome.v1.js
          test ! -e assets/js/site.chrome.v3.js
          test ! -e assets/js/site.notes-images.v3-1.js
          test ! -e assets/css/site.footer.v3-2.css

      - name: Commit cleaned production tree
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          if git diff --cached --quiet; then
            echo 'No cleanup changes to commit'
            exit 0
          fi
          git commit -m 'Remove obsolete post-refactor assets and checks'
          git push origin HEAD:feature/post-refactor-tail-audit-v1
