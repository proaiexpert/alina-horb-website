name: Apply V3.2 privacy and intake

on:
  push:
    branches:
      - feature/v32-privacy-intake
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  implement-and-qa:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: feature/v32-privacy-intake
          fetch-depth: 0

      - name: Apply approved intake markup
        run: python3 scripts/apply-v32-privacy-intake.py

      - name: Validate repository and privacy contract
        run: |
          python3 scripts/validate-assets.py
          python3 scripts/validate-social-previews.py
          python3 scripts/validate-public-email.py
          python3 scripts/validate-privacy-intake.py

      - name: Install Playwright
        run: |
          npm install --no-save playwright@1.55.0
          npx playwright install --with-deps chromium

      - name: Start local site
        run: |
          python3 -m http.server 8080 --bind 127.0.0.1 > /tmp/alina-site.log 2>&1 &
          echo $! > /tmp/alina-site.pid
          sleep 2

      - name: Run responsive privacy and intake QA
        run: node scripts/qa-v32-privacy-intake.mjs

      - name: Upload privacy and intake QA
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v32-privacy-intake-qa
          path: qa-artifacts/privacy-intake
          if-no-files-found: error

      - name: Commit production markup
        if: github.event_name == 'push' && success()
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html ru/index.html
          if git diff --cached --quiet; then
            echo "No generated production changes to commit."
            exit 0
          fi
          git commit -m "Implement safe bilingual first-contact form"
          git push origin HEAD:feature/v32-privacy-intake
