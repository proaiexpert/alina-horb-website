name: PR 11 Final Hero Contact QA

on:
  push:
    branches:
      - review/pr11-visual-qa
  pull_request:
    branches:
      - feature/premium-editorial-v2

permissions:
  contents: read

jobs:
  qa:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout PR 11 branch
        uses: actions/checkout@v4
        with:
          ref: feature/premium-editorial-v2

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright
        run: |
          npm install --no-save playwright@1.52.0
          npx playwright install --with-deps chromium webkit

      - name: Start local site
        run: |
          python3 -m http.server 4173 > /tmp/alina-http.log 2>&1 &
          for i in {1..30}; do
            curl -fsS http://127.0.0.1:4173/ >/dev/null && exit 0
            sleep 1
          done
          cat /tmp/alina-http.log
          exit 1

      - name: Capture final QA
        run: |
          mkdir -p final-qa
          cat > /tmp/final-qa.mjs <<'EOF'
          import { chromium, webkit } from 'playwright';
          import fs from 'node:fs/promises';
          import path from 'node:path';

          const base = 'http://127.0.0.1:4173';
          const out = path.resolve('final-qa');
          const report = [];
          const cases = [
            { id: 'ua-hero-desktop', url: '/', width: 1440, height: 1000, selector: '.hero' },
            { id: 'ua-hero-mobile', url: '/', width: 390, height: 844, selector: '.hero', mobile: true },
            { id: 'ua-contact-desktop', url: '/', width: 1440, height: 1000, selector: '#contact' },
            { id: 'ua-contact-mobile', url: '/', width: 390, height: 844, selector: '#contact', mobile: true },
            { id: 'ru-hero-desktop', url: '/ru/', width: 1440, height: 1000, selector: '.hero' },
            { id: 'ru-contact-desktop', url: '/ru/', width: 1440, height: 1000, selector: '#contact' }
          ];

          for (const [browserName, browserType] of [['chromium', chromium], ['webkit', webkit]]) {
            const browser = await browserType.launch();
            const dir = path.join(out, browserName);
            await fs.mkdir(dir, { recursive: true });
            for (const item of cases) {
              const context = await browser.newContext({ viewport: { width: item.width, height: item.height }, isMobile: !!item.mobile, hasTouch: !!item.mobile });
              const page = await context.newPage();
              const errors = [];
              const badResponses = [];
              page.on('console', m => { if (m.type() === 'error') errors.push(m.text()); });
              page.on('pageerror', e => errors.push(String(e)));
              page.on('response', r => { if (r.url().startsWith(base) && r.status() >= 400) badResponses.push({ status: r.status(), url: r.url() }); });
              const response = await page.goto(base + item.url, { waitUntil: 'networkidle' });
              await page.evaluate(async () => {
                await document.fonts?.ready;
                document.documentElement.style.scrollBehavior = 'auto';
                [...document.querySelectorAll('[data-reveal], .hero-portrait')].forEach(el => el.classList.add('is-visible'));
              });
              await page.waitForTimeout(300);
              const locator = page.locator(item.selector).first();
              await locator.scrollIntoViewIfNeeded();
              await page.waitForTimeout(150);
              await locator.screenshot({ path: path.join(dir, `${item.id}.png`) });
              const metrics = await page.evaluate(() => {
                const hero = document.querySelector('.hero-portrait');
                const heroImg = document.querySelector('.hero-portrait img');
                const form = document.querySelector('.contact-form-wrap');
                return {
                  overflow: Math.max(document.documentElement.scrollWidth, document.body.scrollWidth) - innerWidth,
                  forms: document.querySelectorAll('form').length,
                  telegram: document.querySelector('.telegram-handle')?.textContent?.trim() || null,
                  heroBox: hero ? { width: Math.round(hero.getBoundingClientRect().width), height: Math.round(hero.getBoundingClientRect().height) } : null,
                  heroImageNatural: heroImg ? [heroImg.naturalWidth, heroImg.naturalHeight] : null,
                  heroImageRendered: heroImg ? { width: Math.round(heroImg.getBoundingClientRect().width), height: Math.round(heroImg.getBoundingClientRect().height) } : null,
                  formWidth: form ? Math.round(form.getBoundingClientRect().width) : null,
                  brokenImages: [...document.images].filter(img => !img.complete || img.naturalWidth === 0).map(img => img.currentSrc || img.src)
                };
              });
              report.push({ browserName, id: item.id, status: response?.status(), errors, badResponses, ...metrics });
              await context.close();
            }
            await browser.close();
          }

          await fs.writeFile(path.join(out, 'report.json'), JSON.stringify(report, null, 2));
          await fs.writeFile(path.join(out, 'summary.txt'), 'Screenshots and metrics captured for refined PR 11.\n');
          EOF
          node /tmp/final-qa.mjs

      - name: Upload QA artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr11-final-hero-contact-qa
          path: final-qa
          if-no-files-found: error
          retention-days: 7
