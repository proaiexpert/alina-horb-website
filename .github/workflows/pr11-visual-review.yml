name: PR 11 Final Hero Contact QA

on:
  push:
    branches:
      - review/pr11-visual-qa
  pull_request:
    branches:
      - feature/premium-editorial-v2

permissions:
  contents: read

jobs:
  qa:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout PR 11 branch
        uses: actions/checkout@v4
        with:
          ref: feature/premium-editorial-v2

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Chromium
        run: |
          npm install --no-save playwright@1.52.0
          npx playwright install --with-deps chromium

      - name: Start local site
        run: |
          python3 -m http.server 4173 > /tmp/alina-http.log 2>&1 &
          for i in {1..30}; do
            curl -fsS http://127.0.0.1:4173/ >/dev/null && exit 0
            sleep 1
          done
          cat /tmp/alina-http.log
          exit 1

      - name: Capture full pages
        run: |
          mkdir -p final-qa
          cat > capture.mjs <<'EOF'
          import { chromium } from 'playwright';
          import fs from 'node:fs/promises';

          const browser = await chromium.launch();
          const cases = [
            ['ua-desktop-1440', '/', 1440, 1000, false],
            ['ua-mobile-390', '/', 390, 844, true],
            ['ru-desktop-1440', '/ru/', 1440, 1000, false],
            ['ru-mobile-390', '/ru/', 390, 844, true]
          ];
          const report = [];
          for (const [id, url, width, height, mobile] of cases) {
            const context = await browser.newContext({ viewport: { width, height }, isMobile: mobile, hasTouch: mobile });
            const page = await context.newPage();
            const errors = [];
            page.on('console', m => { if (m.type() === 'error') errors.push(m.text()); });
            page.on('pageerror', e => errors.push(String(e)));
            const response = await page.goto('http://127.0.0.1:4173' + url, { waitUntil: 'networkidle' });
            await page.evaluate(async () => {
              if (document.fonts && document.fonts.ready) await document.fonts.ready;
              document.documentElement.style.scrollBehavior = 'auto';
              [...document.querySelectorAll('[data-reveal], .hero-portrait')].forEach(el => el.classList.add('is-visible'));
            });
            await page.waitForTimeout(500);
            await page.screenshot({ path: `final-qa/${id}.png`, fullPage: true });
            const metrics = await page.evaluate(() => {
              const hero = document.querySelector('.hero-portrait');
              const heroImg = document.querySelector('.hero-portrait img');
              const form = document.querySelector('.contact-form-wrap');
              return {
                overflow: Math.max(document.documentElement.scrollWidth, document.body.scrollWidth) - innerWidth,
                forms: document.querySelectorAll('form').length,
                telegram: document.querySelector('.telegram-handle')?.textContent?.trim() || null,
                heroBox: hero ? { width: Math.round(hero.getBoundingClientRect().width), height: Math.round(hero.getBoundingClientRect().height) } : null,
                heroImageNatural: heroImg ? [heroImg.naturalWidth, heroImg.naturalHeight] : null,
                heroImageRendered: heroImg ? { width: Math.round(heroImg.getBoundingClientRect().width), height: Math.round(heroImg.getBoundingClientRect().height) } : null,
                formWidth: form ? Math.round(form.getBoundingClientRect().width) : null,
                brokenImages: [...document.images].filter(img => !img.complete || img.naturalWidth === 0).map(img => img.currentSrc || img.src)
              };
            });
            report.push({ id, status: response?.status(), errors, ...metrics });
            await context.close();
          }
          await browser.close();
          await fs.writeFile('final-qa/report.json', JSON.stringify(report, null, 2));
          await fs.writeFile('final-qa/summary.txt', 'Full-page screenshots captured.\n');
          EOF
          node capture.mjs > final-qa/run.log 2>&1 || echo "Capture failed; inspect run.log" >> final-qa/summary.txt
          cp /tmp/alina-http.log final-qa/http.log || true

      - name: Upload QA artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr11-final-hero-contact-qa
          path: final-qa
          if-no-files-found: error
          retention-days: 7
