name: Apply result-focused bilingual copy v1

on:
  push:
    branches:
      - content/result-focused-copy-v1

permissions:
  contents: write

jobs:
  apply-and-validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: content/result-focused-copy-v1
          fetch-depth: 0

      - name: Apply bilingual copy update
        run: python3 scripts/apply-result-focused-copy-v1.py

      - name: Validate public pages
        run: |
          set -euo pipefail
          python3 scripts/validate-about-pages-v1.py
          python3 scripts/validate-consultations-pages-v1.py
          python3 scripts/validate-release-readiness.py
          node --check assets/js/site.v2.js
          grep -Fq 'Работа с ясной целью и вниманием к результату' ru/about/index.html
          grep -Fq 'Робота з чіткою метою та увагою до результату' about/index.html
          grep -Fq 'Ориентация на результат' ru/index.html
          grep -Fq 'Орієнтація на результат' index.html
          grep -Fq 'Ориентация на результат' ru/consultations/index.html
          grep -Fq 'Орієнтація на результат' consultations/index.html

      - name: Commit clean implementation
        run: |
          set -euo pipefail
          rm scripts/apply-result-focused-copy-v1.py
          rm .github/workflows/apply-result-focused-copy-v1.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Reframe professional responsibility around measurable progress"
          git push origin HEAD:content/result-focused-copy-v1
