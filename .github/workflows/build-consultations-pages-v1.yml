name: Finalize bilingual consultations pages v1

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  finalize:
    if: github.head_ref == 'feature/finalize-consultations-v1' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/finalize-consultations-v1
          fetch-depth: 0

      - name: Decode prepared production files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p consultations ru/consultations assets/css scripts
          python3 - <<'PY'
          from pathlib import Path
          import base64
          import gzip

          files = {
              '.tmp/consultations-v1/ua.html.gz.b64': 'consultations/index.html',
              '.tmp/consultations-v1/ru.html.gz.b64': 'ru/consultations/index.html',
              '.tmp/consultations-v1/css.gz.b64': 'assets/css/site.consultations.v1.css',
              '.tmp/consultations-v1/validator.gz.b64': 'scripts/validate-consultations-pages-v1.py',
              '.tmp/consultations-v1/integrate.py.gz.b64': 'scripts/integrate-consultations-v1.py',
          }
          for source, destination in files.items():
              encoded = ''.join(Path(source).read_text(encoding='utf-8').split())
              encoded += '=' * (-len(encoded) % 4)
              print(f'Decoding {source}: {len(encoded)} base64 characters')
              payload = gzip.decompress(base64.b64decode(encoded, validate=False))
              target = Path(destination)
              target.parent.mkdir(parents=True, exist_ok=True)
              target.write_bytes(payload)
              print(f'Wrote {destination}: {len(payload)} bytes')
          PY
          chmod +x scripts/validate-consultations-pages-v1.py scripts/integrate-consultations-v1.py

      - name: Integrate and validate
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/integrate-consultations-v1.py
          python3 -m py_compile scripts/validate-consultations-pages-v1.py
          python3 scripts/validate-consultations-pages-v1.py
          node --check assets/js/site.v2.js
          grep -Fq 'consultations/index.html' scripts/apply-indexing-launch-v3-2.py
          grep -Fq 'https://alinahorb.com/consultations/' sitemap.xml
          grep -Fq 'cp -R consultations _site/' .github/workflows/deploy-pages.yml

      - name: Commit clean feature implementation
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .tmp/consultations-v1
          rm .github/workflows/build-consultations-pages-v1.yml
          rm scripts/integrate-consultations-v1.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Publish bilingual consultations and conditions pages"
          git push origin HEAD:feature/finalize-consultations-v1
