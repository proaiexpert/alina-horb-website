name: Finalize bilingual consultations pages v1

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  finalize:
    if: github.head_ref == 'feature/finalize-consultations-v1' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/finalize-consultations-v1
          fetch-depth: 0

      - name: Decode Ukrainian page
        run: python3 -c "from pathlib import Path; import base64,gzip; s=''.join(Path('.tmp/consultations-v1/ua.html.gz.b64').read_text().split()); Path('consultations').mkdir(exist_ok=True); Path('consultations/index.html').write_bytes(gzip.decompress(base64.b64decode(s + '=' * (-len(s) % 4))))"

      - name: Decode Russian page
        run: python3 -c "from pathlib import Path; import base64,gzip; s=''.join(Path('.tmp/consultations-v1/ru.html.gz.b64').read_text().split()); Path('ru/consultations').mkdir(parents=True,exist_ok=True); Path('ru/consultations/index.html').write_bytes(gzip.decompress(base64.b64decode(s + '=' * (-len(s) % 4))))"

      - name: Decode consultations stylesheet
        run: python3 -c "from pathlib import Path; import base64,gzip; s=''.join(Path('.tmp/consultations-v1/css.gz.b64').read_text().split()); Path('assets/css').mkdir(parents=True,exist_ok=True); Path('assets/css/site.consultations.v1.css').write_bytes(gzip.decompress(base64.b64decode(s + '=' * (-len(s) % 4))))"

      - name: Integrate and validate
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/integrate-consultations-v1.py
          python3 -m py_compile scripts/validate-consultations-pages-v1.py
          python3 scripts/validate-consultations-pages-v1.py
          node --check assets/js/site.v2.js
          grep -Fq 'consultations/index.html' scripts/apply-indexing-launch-v3-2.py
          grep -Fq 'https://alinahorb.com/consultations/' sitemap.xml
          grep -Fq 'cp -R consultations _site/' .github/workflows/deploy-pages.yml

      - name: Commit production implementation
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .tmp/consultations-v1
          rm scripts/integrate-consultations-v1.py
          git checkout HEAD -- .github/workflows/deploy-pages.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Publish bilingual consultations and conditions pages"
          git push origin HEAD:feature/finalize-consultations-v1
