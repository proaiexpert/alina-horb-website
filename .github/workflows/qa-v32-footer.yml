name: QA V3.2 footer consistency

on:
  push:
    branches:
      - fix/v32-footer-consistency
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  footer-qa:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: fix/v32-footer-consistency

      - name: Install Playwright
        run: |
          npm install --no-save playwright@1.54.1
          npx playwright install --with-deps chromium

      - name: Start local site
        run: |
          python3 -m http.server 8080 >/tmp/alina-footer-server.log 2>&1 &
          echo $! > /tmp/alina-footer-server.pid
          for i in {1..20}; do
            curl -fsS http://127.0.0.1:8080/ >/dev/null && exit 0
            sleep 1
          done
          cat /tmp/alina-footer-server.log
          exit 1

      - name: Run footer visual QA
        run: node scripts/qa-footer-screenshots.mjs

      - name: Validate repository assets
        run: python3 scripts/validate-assets.py

      - name: Upload footer screenshots and report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v32-footer-qa
          path: qa-artifacts/footer
          if-no-files-found: error
