name: Integrate bilingual About pages

on:
  push:
    branches:
      - feature/about-pages-v1
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  integrate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/about-pages-v1
          fetch-depth: 0

      - name: Integrate About pages
        run: python3 scripts/integrate-about-pages-v1.py

      - name: Validate source pages
        run: python3 scripts/validate-about-pages-v1.py

      - name: Commit integrated site files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            index.html \
            ru/index.html \
            sitemap.xml \
            scripts/apply-indexing-launch-v3-2.py \
            scripts/apply-social-favicon-v3-3.py \
            scripts/validate-favicon-social-v3-3.py \
            scripts/validate-release-readiness.py
          git diff --cached --quiet && exit 0
          git commit -m "Integrate bilingual About pages across site"
          git push origin HEAD:feature/about-pages-v1
