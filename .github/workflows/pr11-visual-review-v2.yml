name: PR 11 Visual Review V2

on:
  push:
    branches:
      - review/pr11-visual-qa
  pull_request:
    branches:
      - feature/premium-editorial-v2

permissions:
  contents: read

jobs:
  visual-review-v2:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout review branch
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright
        run: |
          npm install --no-save playwright@1.52.0
          npx playwright install --with-deps chromium webkit

      - name: Start local site
        run: |
          python3 -m http.server 4173 > /tmp/alina-http.log 2>&1 &
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:4173/ >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/alina-http.log
          exit 1

      - name: Capture scroll-aware visual review
        run: node scripts/pr11-visual-review.mjs

      - name: Upload visual review V2
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr11-visual-review-v2
          path: visual-review-v2
          if-no-files-found: error
          retention-days: 7
