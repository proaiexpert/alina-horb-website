name: Inspect recent Pages deployments

on:
  pull_request:
    branches:
      - main

permissions:
  actions: read
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Print recent deploy-pages runs
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPO}/actions/workflows/deploy-pages.yml/runs?branch=main&per_page=10" \
            -o runs.json
          python3 - <<'PY'
          import json
          data = json.load(open('runs.json', encoding='utf-8'))
          print(f"TOTAL MATCHING RUNS: {data.get('total_count')}")
          for run in data.get('workflow_runs', []):
              print(
                  f"RUN id={run['id']} status={run['status']} conclusion={run.get('conclusion')} "
                  f"event={run['event']} head_sha={run['head_sha']} created={run['created_at']} "
                  f"updated={run['updated_at']} url={run['html_url']}"
              )
          PY
