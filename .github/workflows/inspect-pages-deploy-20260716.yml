name: Inspect Pages deployment failure

on:
  pull_request:
    branches:
      - main

permissions:
  actions: read
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Print deployment failure details
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          curl -fsSL -L \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPO}/actions/jobs/87725924994/logs" \
            -o deploy-job.log
          echo '--- FAILURE CONTEXT ---'
          python3 - <<'PY'
          from pathlib import Path
          lines = Path('deploy-job.log').read_text(encoding='utf-8', errors='replace').splitlines()
          markers = ('Error', 'ERROR', 'Traceback', 'AssertionError', 'SystemExit', 'failed', 'FAIL', 'Missing', 'expected', 'Expected', '##[error]')
          hits = [i for i, line in enumerate(lines) if any(marker in line for marker in markers)]
          if not hits:
              print('No explicit marker found. Last 35 lines:')
              for line in lines[-35:]:
                  print(line)
          else:
              start = max(0, min(hits) - 12)
              end = min(len(lines), max(hits) + 13)
              for line in lines[start:end]:
                  print(line)
          PY
