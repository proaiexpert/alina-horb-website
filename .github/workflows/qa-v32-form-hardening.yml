name: QA V3.2 form hardening

on:
  push:
    branches:
      - release/v3-2-form-indexing
      - release/v3-2-indexing-launch
      - fix/social-preview-favicons-v3-3
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  form-hardening:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4

      - name: Build hardened runtime
        run: |
          python3 scripts/apply-v32-form-hardening.py
          python3 scripts/apply-turnstile-v3-2.py
          node --check assets/js/site.v2.js

      - name: Enable production indexing
        run: python3 scripts/apply-indexing-launch-v3-2.py

      - name: Build localized social previews and favicon fallbacks
        run: python3 scripts/apply-social-favicon-v3-3.py

      - name: Validate assets
        run: python3 scripts/validate-assets.py

      - name: Validate social previews and favicons
        run: |
          python3 scripts/validate-social-previews.py
          python3 scripts/validate-favicon-social-v3-3.py

      - name: Validate public email
        run: python3 scripts/validate-public-email.py

      - name: Validate privacy intake
        run: python3 scripts/validate-privacy-intake.py

      - name: Validate release readiness
        run: python3 scripts/validate-release-readiness.py

      - name: Validate form hardening
        run: python3 scripts/validate-form-hardening.py

      - name: Upload hardened runtime
        uses: actions/upload-artifact@v4
        with:
          name: v32-hardened-form-runtime
          path: assets/js/site.v2.js
          if-no-files-found: error
