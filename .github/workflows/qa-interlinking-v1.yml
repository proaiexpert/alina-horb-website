name: QA bilingual interlinking V1

on:
  pull_request:
    paths:
      - 'index.html'
      - 'ru/index.html'
      - 'about/**'
      - 'ru/about/**'
      - 'consultations/**'
      - 'ru/consultations/**'
      - 'notes/**'
      - 'ru/notes/**'
      - 'assets/js/site.chrome.v3.js'
      - 'assets/css/site.notes-hub.v3-2.css'
      - 'scripts/validate-interlinking-v1.py'
      - '.github/workflows/qa-interlinking-v1.yml'
  push:
    branches:
      - main
    paths:
      - 'index.html'
      - 'ru/index.html'
      - 'about/**'
      - 'ru/about/**'
      - 'consultations/**'
      - 'ru/consultations/**'
      - 'notes/**'
      - 'ru/notes/**'
      - 'assets/js/site.chrome.v3.js'
      - 'assets/css/site.notes-hub.v3-2.css'
      - 'scripts/validate-interlinking-v1.py'
      - '.github/workflows/qa-interlinking-v1.yml'

permissions:
  contents: write

jobs:
  validate-interlinking:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
      - name: Diagnose bilingual routes and conversion paths
        run: |
          set +e
          python3 scripts/validate-interlinking-v1.py > /tmp/interlinking-output.txt 2>&1
          status=$?
          cat /tmp/interlinking-output.txt
          if [ "$status" -ne 0 ] && [ "${{ github.event_name }}" = "pull_request" ]; then
            cp /tmp/interlinking-output.txt qa-interlinking-error.txt
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add qa-interlinking-error.txt
            git commit -m "Record interlinking validation error" || true
            git push origin HEAD:${{ github.event.pull_request.head.ref }}
          fi
          exit "$status"
      - name: Check shared JavaScript syntax
        run: |
          node --check assets/js/site.chrome.v3.js
          node --check assets/js/site.navigation.v1.js
      - name: Verify editorial conversion markers
        run: |
          grep -Fq 'notes-hub-conversion' notes/index.html
          grep -Fq 'notes-hub-conversion' ru/notes/index.html
          grep -Fq 'consultations/#contact' notes/first-consultation/index.html
          grep -Fq 'consultations/#contact' ru/notes/first-consultation/index.html
