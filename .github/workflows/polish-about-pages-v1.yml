name: Apply final About visual polish

on:
  push:
    branches:
      - feature/about-pages-v1

permissions:
  contents: write

jobs:
  polish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/about-pages-v1
          fetch-depth: 0

      - name: Apply visual polish
        run: python3 scripts/polish-about-pages-v1.py

      - name: Validate About pages
        run: python3 scripts/validate-about-pages-v1.py

      - name: Commit polished stylesheet
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/css/site.about.v1.css
          git diff --cached --quiet && exit 0
          git commit -m "Polish About page overflow and diploma presentation"
          git push origin HEAD:feature/about-pages-v1
