name: Finalize global chrome V1

on:
  pull_request:
    branches:
      - main
    paths:
      - 'scripts/finalize-global-chrome-v1.py'
      - '.github/workflows/finalize-global-chrome-v1.yml'

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - name: Normalize RU routes and validator ownership
        run: python3 scripts/finalize-global-chrome-v1.py
      - name: Run pre-commit diagnostics
        run: |
          set +e
          python3 scripts/validate-global-chrome-v1.py
          python3 scripts/validate-interlinking-v1.py
          python3 scripts/validate-privacy-intake.py
          python3 scripts/validate-article-v32.py
          python3 scripts/validate-article-start-conversation.py
          python3 scripts/validate-article-coping-support.py
          python3 scripts/validate-article-relocation.py
          node --check assets/js/site.global-chrome.v1.js
          node --check assets/js/site.chrome.v3.js
          node --check assets/js/site.v2.js
          node --check assets/js/site.navigation.v1.js
          exit 0
      - name: Remove one-time compatibility machinery
        run: |
          rm scripts/finalize-global-chrome-v1.py
          rm .github/workflows/finalize-global-chrome-v1.yml
      - name: Commit final production compatibility
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Finalize canonical global chrome compatibility"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
