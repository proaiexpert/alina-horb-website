name: Apply premium About page refinement

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  refine-about:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Apply premium About pass
        run: python3 scripts/apply-about-premium-pass-v2.py

      - name: Validate About pages
        run: python3 scripts/validate-about-pages-v1.py

      - name: Commit refined pages and remove migration helpers
        run: |
          rm scripts/apply-about-premium-pass-v2.py
          rm .github/workflows/apply-about-premium-pass-v2.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add about/index.html ru/about/index.html assets/css/site.about.v1.css scripts/apply-about-premium-pass-v2.py .github/workflows/apply-about-premium-pass-v2.yml
          git diff --cached --quiet && exit 0
          git commit -m "Refine premium bilingual About experience"
          git push origin HEAD:main
