name: Simulate production indexing validation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  simulate-production:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4

      - name: Validate source indexing state
        run: |
          python3 scripts/validate-article-v32.py
          python3 scripts/validate-article-start-conversation.py
          python3 scripts/validate-article-coping-support.py
          python3 scripts/validate-article-relocation.py
          python3 scripts/validate-notes-hub-v32.py

      - name: Simulate production build
        run: |
          python3 scripts/apply-notes-images-v3-1.py
          python3 scripts/patch-notes-validator-expectations-v3-1.py
          node --check assets/js/site.notes-images.v3-1.js
          python3 scripts/validate-notes-images-v3-1.py
          python3 scripts/apply-turnstile-v3-2.py
          node --check assets/js/site.v2.js
          python3 scripts/apply-indexing-launch-v3-2.py
          python3 scripts/apply-social-favicon-v3-3.py

      - name: Validate simulated production site
        run: |
          python3 scripts/validate-assets.py
          python3 scripts/validate-social-previews.py
          python3 scripts/validate-favicon-social-v3-3.py
          python3 scripts/validate-public-email.py
          python3 scripts/validate-privacy-intake.py
          python3 scripts/validate-form-hardening.py
          python3 scripts/validate-notes-images-v3.py
          python3 scripts/validate-notes-images-v3-1.py
          python3 scripts/validate-article-v32.py
          python3 scripts/validate-article-start-conversation.py
          python3 scripts/validate-article-coping-support.py
          python3 scripts/validate-article-relocation.py
          python3 scripts/validate-notes-hub-v32.py
          python3 scripts/validate-release-readiness.py
