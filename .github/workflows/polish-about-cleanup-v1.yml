name: Polish About cleanup formatting

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  polish-validate-clean:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Polish formatting
        run: python3 scripts/polish-about-cleanup-v1.py

      - name: Validate affected pages
        run: |
          set -euo pipefail
          python3 scripts/validate-about-pages-v1.py
          python3 scripts/validate-consultations-pages-v1.py
          node --check assets/js/site.v2.js

      - name: Commit polish and remove temporary files
        run: |
          set -euo pipefail
          rm -f .github/workflows/polish-about-cleanup-v1.yml
          rm -f scripts/polish-about-cleanup-v1.py
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Polish About cleanup formatting'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
