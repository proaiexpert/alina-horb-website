name: Normalize source homepages

on:
  push:
    branches:
      - content/bilingual-author-quote-v3-3
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  normalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: content/bilingual-author-quote-v3-3
          fetch-depth: 0

      - name: Normalize source-only metadata
        run: python3 scripts/normalize-source-homepages-v3-3.py

      - name: Validate source state
        run: |
          python3 scripts/validate-social-previews.py
          python3 scripts/validate-notes-hub-v32.py

      - name: Commit normalized homepages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html ru/index.html
          git diff --cached --quiet && exit 0
          git commit -m "Normalize homepage source metadata"
          git push origin HEAD:content/bilingual-author-quote-v3-3
