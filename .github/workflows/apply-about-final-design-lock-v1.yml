name: Apply final About design lock

on:
  push:
    branches:
      - feature/about-pages-v1

permissions:
  contents: write

jobs:
  design-lock:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/about-pages-v1
          fetch-depth: 0

      - name: Apply final editorial design lock
        run: python3 scripts/apply-about-final-design-lock-v1.py

      - name: Validate About pages
        run: python3 scripts/validate-about-pages-v1.py

      - name: Commit design lock
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/css/site.about.v1.css
          git diff --cached --quiet && exit 0
          git commit -m "Lock premium About page visual system"
          git push origin HEAD:feature/about-pages-v1
