name: QA V3.2 Notes hub

on:
  push:
    branches:
      - feature/v32-notes-hub
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  notes-hub-qa:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: feature/v32-notes-hub
          fetch-depth: 0

      - name: Apply production Notes hub
        run: |
          python3 scripts/apply-v32-notes-hub.py
          python3 scripts/normalize-v32-notes-hub.py

      - name: Validate production contracts
        run: |
          python3 scripts/validate-assets.py
          python3 scripts/validate-social-previews.py
          python3 scripts/validate-public-email.py
          python3 scripts/validate-privacy-intake.py
          python3 scripts/validate-article-v32.py
          python3 scripts/validate-article-start-conversation.py
          python3 scripts/validate-article-coping-support.py
          python3 scripts/validate-article-relocation.py
          python3 scripts/validate-notes-hub-v32.py

      - name: Install Playwright
        run: |
          npm install --no-save playwright@1.55.0
          npx playwright install --with-deps chromium

      - name: Start local site
        run: |
          python3 -m http.server 8080 --bind 127.0.0.1 > /tmp/alina-notes-hub.log 2>&1 &
          echo $! > /tmp/alina-notes-hub.pid
          sleep 2

      - name: Run responsive Notes QA
        run: node scripts/qa-v32-notes-hub.mjs

      - name: Upload Notes QA
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v32-notes-hub-qa
          path: qa-artifacts/notes-hub-v32
          if-no-files-found: error

      - name: Commit production pages
        if: github.event_name == 'push' && success()
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html ru/index.html notes/index.html ru/notes/index.html
          if git diff --cached --quiet; then
            echo "No Notes hub changes to commit."
            exit 0
          fi
          git commit -m "Build bilingual V3.2 Notes hub and homepage cards"
          git push origin HEAD:feature/v32-notes-hub
