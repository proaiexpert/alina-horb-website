name: Apply privacy processor disclosures V1

on:
  push:
    branches:
      - fix/privacy-processors-v1
    paths:
      - 'scripts/apply-privacy-processors-v1.py'
      - '.github/workflows/apply-privacy-processors-v1.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: fix/privacy-processors-v1
          fetch-depth: 0

      - name: Apply processor disclosures
        run: python3 scripts/apply-privacy-processors-v1.py

      - name: Simulate production indexing and validate privacy contract
        run: |
          python3 scripts/apply-indexing-launch-v3-2.py
          python3 scripts/apply-turnstile-v3-2.py
          python3 scripts/validate-privacy-intake.py
          python3 scripts/validate-release-readiness.py
          grep -Fq 'Formspree' privacy/index.html
          grep -Fq 'Cloudflare Turnstile' privacy/index.html
          grep -Fq 'Google Fonts' privacy/index.html
          grep -Fq 'Formspree' ru/privacy/index.html
          grep -Fq 'Cloudflare Turnstile' ru/privacy/index.html
          grep -Fq 'Google Fonts' ru/privacy/index.html

      - name: Commit disclosures
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          if git diff --cached --quiet; then
            echo 'No disclosure changes to commit'
            exit 0
          fi
          git commit -m 'Disclose external form and font processors'
          git push origin HEAD:fix/privacy-processors-v1
