name: Apply V3.2 approach and author voice

on:
  push:
    branches:
      - feature/v32-approach-quote
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  implement-and-qa:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: feature/v32-approach-quote
          fetch-depth: 0

      - name: Apply approved content
        run: python3 scripts/apply-v32-content.py

      - name: Validate repository assets
        run: python3 scripts/validate-assets.py

      - name: Install Playwright
        run: |
          npm install --no-save playwright@1.54.1
          npx playwright install --with-deps chromium

      - name: Start local site
        run: |
          python3 -m http.server 8080 >/tmp/alina-approach-server.log 2>&1 &
          for i in {1..20}; do
            curl -fsS http://127.0.0.1:8080/ >/dev/null && exit 0
            sleep 1
          done
          cat /tmp/alina-approach-server.log
          exit 1

      - name: Run responsive About QA
        run: node scripts/qa-v32-approach.mjs

      - name: Upload About screenshots and report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v32-approach-qa
          path: qa-artifacts/approach
          if-no-files-found: error

      - name: Commit production output
        if: github.event_name == 'push'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html ru/index.html assets/css/site.v3-1-stability.css docs/PROJECT_SOURCE_OF_TRUTH.md
          if git diff --cached --quiet; then
            echo "No production changes to commit."
            exit 0
          fi
          git commit -m "Add Alina author voice and working approach"
          git push origin HEAD:feature/v32-approach-quote
