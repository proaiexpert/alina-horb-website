name: Apply Contacts Safety V2.1

on:
  push:
    branches:
      - update/contacts-safety-v2-1

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: update/contacts-safety-v2-1

      - name: Apply update
        run: python3 scripts/apply-contacts-safety-v2-1.py

      - name: Validate changed pages
        run: python3 scripts/validate-assets.py .

      - name: Commit generated changes
        run: |
          if git diff --quiet; then
            echo "No generated changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html ru/index.html assets/js/site-config.v2.js assets/css/site.v2.css
          git commit -m "Update contacts, audiences and safety copy"
          git push origin HEAD:update/contacts-safety-v2-1
