name: QA V3.2 coping-support article

on:
  push:
    branches:
      - feature/v32-article-coping-support
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  coping-support-article-qa:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: feature/v32-article-coping-support
          fetch-depth: 0

      - name: Normalize final direct answer
        run: python3 scripts/apply-v32-article-coping-support.py

      - name: Validate production contracts
        run: |
          python3 scripts/validate-assets.py
          python3 scripts/validate-social-previews.py
          python3 scripts/validate-public-email.py
          python3 scripts/validate-privacy-intake.py
          python3 scripts/validate-article-v32.py
          python3 scripts/validate-article-start-conversation.py
          python3 scripts/validate-article-coping-support.py

      - name: Install Playwright
        run: |
          npm install --no-save playwright@1.55.0
          npx playwright install --with-deps chromium

      - name: Start local site
        run: |
          python3 -m http.server 8080 --bind 127.0.0.1 > /tmp/alina-coping-support.log 2>&1 &
          echo $! > /tmp/alina-coping-support.pid
          sleep 2

      - name: Run responsive article QA
        run: node scripts/qa-v32-article-coping-support.mjs

      - name: Upload article QA
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v32-article-coping-support-qa
          path: qa-artifacts/article-coping-support
          if-no-files-found: error

      - name: Commit normalized production page
        if: github.event_name == 'push' && success()
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ru/notes/when-coping-stops-helping/index.html
          if git diff --cached --quiet; then
            echo "No normalization changes to commit."
            exit 0
          fi
          git commit -m "Normalize Russian direct answer in third article"
          git push origin HEAD:feature/v32-article-coping-support
