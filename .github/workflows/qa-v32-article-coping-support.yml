name: QA V3.2 coping-support article

on:
  push:
    branches:
      - feature/v32-article-coping-support
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  coping-support-article-qa:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: feature/v32-article-coping-support

      - name: Validate production contracts
        run: |
          python3 scripts/validate-assets.py
          python3 scripts/validate-social-previews.py
          python3 scripts/validate-public-email.py
          python3 scripts/validate-privacy-intake.py
          python3 scripts/validate-article-v32.py
          python3 scripts/validate-article-start-conversation.py
          python3 scripts/validate-article-coping-support.py

      - name: Install Playwright
        run: |
          npm install --no-save playwright@1.55.0
          npx playwright install --with-deps chromium

      - name: Start local site
        run: |
          python3 -m http.server 8080 --bind 127.0.0.1 > /tmp/alina-coping-support.log 2>&1 &
          echo $! > /tmp/alina-coping-support.pid
          sleep 2

      - name: Run responsive article QA
        run: node scripts/qa-v32-article-coping-support.mjs

      - name: Upload article QA
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v32-article-coping-support-qa
          path: qa-artifacts/article-coping-support
          if-no-files-found: error
