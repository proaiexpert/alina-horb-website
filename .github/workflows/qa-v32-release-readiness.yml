name: QA V3.2 release readiness

on:
  push:
    branches:
      - feature/v32-release-readiness
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  release-readiness-qa:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: feature/v32-release-readiness
          fetch-depth: 0

      - name: Apply explicit production dependencies
        run: python3 scripts/apply-v32-release-readiness.py

      - name: Validate production contracts
        shell: bash
        run: |
          mkdir -p qa-artifacts/release-readiness-v32
          exec > >(tee qa-artifacts/release-readiness-v32/static-validation.log) 2>&1
          status=0
          for script in \
            scripts/validate-assets.py \
            scripts/validate-social-previews.py \
            scripts/validate-public-email.py \
            scripts/validate-privacy-intake.py \
            scripts/validate-article-v32.py \
            scripts/validate-article-start-conversation.py \
            scripts/validate-article-coping-support.py \
            scripts/validate-article-relocation.py \
            scripts/validate-notes-hub-v32.py \
            scripts/validate-release-readiness.py
          do
            echo "===== ${script} ====="
            python3 "${script}" || status=1
          done
          exit "${status}"

      - name: Install Playwright
        run: |
          npm install --no-save playwright@1.55.0
          npx playwright install --with-deps chromium

      - name: Start local site
        run: |
          python3 -m http.server 8080 --bind 127.0.0.1 > /tmp/alina-release-readiness.log 2>&1 &
          echo $! > /tmp/alina-release-readiness.pid
          sleep 2

      - name: Run all-route responsive QA
        run: node scripts/qa-v32-release-readiness.mjs

      - name: Upload release QA
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v32-release-readiness-qa
          path: qa-artifacts/release-readiness-v32
          if-no-files-found: error

      - name: Commit normalized homepage files
        if: github.event_name == 'push' && success()
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html ru/index.html
          if git diff --cached --quiet; then
            echo "No homepage normalization changes to commit."
            exit 0
          fi
          git commit -m "Consolidate homepage production dependencies and schema"
          git push origin HEAD:feature/v32-release-readiness
