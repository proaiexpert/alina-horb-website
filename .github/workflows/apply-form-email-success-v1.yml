name: Apply compact form email and success UX V1

on:
  pull_request:
    branches:
      - main
    paths:
      - 'scripts/apply-form-email-success-v1.py'
      - '.github/workflows/apply-form-email-success-v1.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'feature/form-email-success-v1'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/form-email-success-v1
          fetch-depth: 0

      - name: Apply compact form patch
        shell: bash
        run: |
          set -o pipefail
          python3 - <<'PY'
          from pathlib import Path
          path = Path('scripts/apply-form-email-success-v1.py')
          text = path.read_text(encoding='utf-8')
          text = text.replace("new_contact = '''  const initContactForm", "new_contact = r'''  const initContactForm", 1)
          text = text.replace(
              "js, count = re.subn(r'  const initContactForm = \\(\\) => \\{.*?\\n  \\};\\n\\n  const initMobileBookingCta', new_contact + \"\\n  const initMobileBookingCta\", js, count=1, flags=re.S)",
              "js, count = re.subn(r'  const initContactForm = \\(\\) => \\{.*?\\n  \\};\\n\\n  const initMobileBookingCta', lambda _: new_contact + \"\\n  const initMobileBookingCta\", js, count=1, flags=re.S)",
              1,
          )
          text = text.replace("turnstile = '''#!/usr/bin/env python3", 'turnstile = r"""#!/usr/bin/env python3', 1)
          text = text.replace("print(\"Cloudflare Turnstile runtime applied\")\n'''\nwrite(\"scripts/apply-turnstile-v3-2.py\", turnstile)", "print(\"Cloudflare Turnstile runtime applied\")\n\"\"\"\nwrite(\"scripts/apply-turnstile-v3-2.py\", turnstile)", 1)
          text = text.replace("validate_form = '''#!/usr/bin/env python3", "validate_form = r'''#!/usr/bin/env python3", 1)
          text = text.replace("consult_validator = '''#!/usr/bin/env python3", "consult_validator = r'''#!/usr/bin/env python3", 1)
          path.write_text(text, encoding='utf-8')
          PY
          python3 scripts/apply-form-email-success-v1.py 2>&1 | tee form-migration.log

      - name: Validate source and production runtime
        shell: bash
        run: |
          set -o pipefail
          {
            python3 scripts/validate-consultations-pages-v1.py
            cp assets/js/site.v2.js /tmp/site.v2.source.js
            python3 scripts/apply-turnstile-v3-2.py
            node --check assets/js/site.v2.js
            grep -Fq 'providerPayloadFrom(payload)' assets/js/site.v2.js
            grep -Fq '"cf-turnstile-response": turnstileToken' assets/js/site.v2.js
            grep -Fq 'showSuccessConfirmation();' assets/js/site.v2.js
            mv /tmp/site.v2.source.js assets/js/site.v2.js
            python3 -m py_compile scripts/apply-turnstile-v3-2.py scripts/validate-form-hardening.py scripts/validate-consultations-pages-v1.py scripts/validate-privacy-intake.py
            ! grep -R -n --include='index.html' 'name="language"' index.html ru/index.html consultations/index.html ru/consultations/index.html
            grep -Fq 'data-form-success' index.html
            grep -Fq 'data-form-success' ru/index.html
            grep -Fq 'data-form-success' consultations/index.html
            grep -Fq 'data-form-success' ru/consultations/index.html
          } 2>&1 | tee form-validation.log

      - name: Upload migration diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: form-migration-diagnostics
          path: |
            form-migration.log
            form-validation.log
          retention-days: 3
          if-no-files-found: warn

      - name: Commit form improvements
        run: |
          git restore scripts/apply-form-email-success-v1.py
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git reset form-migration.log form-validation.log || true
          if git diff --cached --quiet; then
            echo 'No form changes to commit'
            exit 0
          fi
          git commit -m 'Simplify intake email and add visible success confirmation'
          git push origin HEAD:feature/form-email-success-v1
