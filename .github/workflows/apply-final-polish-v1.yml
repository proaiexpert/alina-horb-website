name: Apply final editorial polish V1

on:
  pull_request:
    branches:
      - main
    paths:
      - 'scripts/apply-final-polish-v1.py'
      - '.github/workflows/apply-final-polish-v1.yml'

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Apply final editorial polish
        run: python3 scripts/apply-final-polish-v1.py

      - name: Validate patched assets
        run: |
          node --check scripts/audit-final-ux-v1.mjs
          python3 scripts/validate-global-chrome-v1.py
          python3 scripts/validate-editorial-navigation-v1.py

      - name: Remove one-time polish machinery
        run: |
          rm scripts/apply-final-polish-v1.py
          rm .github/workflows/apply-final-polish-v1.yml

      - name: Commit polished production layout
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Polish editorial hero placement and reading measure"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
