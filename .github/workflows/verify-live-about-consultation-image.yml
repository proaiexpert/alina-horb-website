name: Verify live About consultation image

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  verify-live:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Wait for bilingual production update
        run: |
          set -euo pipefail
          ua='https://alinahorb.com/about/?v=consultation-space-20260717'
          ru='https://alinahorb.com/ru/about/?v=consultation-space-20260717'
          image='https://alinahorb.com/assets/images/about/alina-horb-consultation-space-v1.webp?v=20260717'
          verified=0

          for attempt in $(seq 1 30); do
            curl -fsSL --max-time 20 "$ua" -o /tmp/about-ua.html || true
            curl -fsSL --max-time 20 "$ru" -o /tmp/about-ru.html || true
            curl -fsSL --max-time 20 "$image" -o /tmp/about-consultation.webp || true

            if grep -Fq 'alina-horb-consultation-space-v1.webp' /tmp/about-ua.html \
              && grep -Fq 'Простір для уважної розмови, тиші й внутрішньої опори.' /tmp/about-ua.html \
              && grep -Fq 'alina-horb-consultation-space-v1.webp' /tmp/about-ru.html \
              && grep -Fq 'Пространство для внимательного разговора, тишины и внутренней опоры.' /tmp/about-ru.html \
              && file /tmp/about-consultation.webp | grep -Fq 'Web/P image' \
              && file /tmp/about-consultation.webp | grep -Eq '700x525|700 x 525'; then
              verified=1
              echo "Live UA/RU pages and image verified on attempt ${attempt}."
              file /tmp/about-consultation.webp
              break
            fi

            echo "Attempt ${attempt}: production update not visible yet"
            sleep 20
          done

          test "$verified" -eq 1

      - name: Record successful verification
        run: |
          set -euo pipefail
          rm .github/workflows/verify-live-about-consultation-image.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/verify-live-about-consultation-image.yml
          git commit -m "Verify live consultation image on About pages"
          git push origin HEAD:main
