name: QA editorial navigation V1

on:
  pull_request:
    paths:
      - 'assets/css/site.navigation.v1.css'
      - 'assets/js/site.navigation.v1.js'
      - 'assets/js/site.v2.js'
      - '**/*.html'
      - 'scripts/validate-editorial-navigation-v1.py'
      - '.github/workflows/qa-editorial-navigation-v1.yml'
  push:
    branches:
      - main
    paths:
      - 'assets/css/site.navigation.v1.css'
      - 'assets/js/site.navigation.v1.js'
      - 'assets/js/site.v2.js'
      - '**/*.html'
      - 'scripts/validate-editorial-navigation-v1.py'
      - '.github/workflows/qa-editorial-navigation-v1.yml'

permissions:
  contents: read

jobs:
  validate-navigation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check JavaScript syntax
        run: |
          node --check assets/js/site.v2.js
          node --check assets/js/site.navigation.v1.js
      - name: Validate navigation contract
        run: python3 scripts/validate-editorial-navigation-v1.py
      - name: Verify production CSS and runtime markers
        run: |
          grep -Fq '.editorial-rail .rail-booking-link' assets/css/site.navigation.v1.css
          grep -Fq '@media (max-width: 1180px)' assets/css/site.navigation.v1.css
          grep -Fq 'setBackgroundInert' assets/js/site.navigation.v1.js
          grep -Fq 'fallbackDesktopNav' assets/js/site.navigation.v1.js
