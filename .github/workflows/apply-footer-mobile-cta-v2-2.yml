name: Apply Footer Mobile CTA V2.2

on:
  push:
    branches:
      - polish/footer-mobile-cta-v2-2

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: polish/footer-mobile-cta-v2-2

      - name: Apply footer and mobile CTA polish
        run: python3 scripts/apply-footer-mobile-cta-v2-2.py

      - name: Validate local assets
        run: python3 scripts/validate-assets.py .

      - name: Commit generated changes
        run: |
          if git diff --quiet; then
            echo "No generated changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html ru/index.html assets/css/site.v2.css assets/js/site.v2.js
          git commit -m "Polish footer and add mobile booking CTA"
          git push origin HEAD:polish/footer-mobile-cta-v2-2
