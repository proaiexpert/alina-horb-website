name: Apply final bilingual author quote

on:
  push:
    branches:
      - content/final-author-quote-v3-4

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: content/final-author-quote-v3-4
          fetch-depth: 0

      - name: Apply approved quote order
        run: python3 scripts/apply-final-author-quote-v3-4.py

      - name: Validate final texts
        run: |
          python3 - <<'PY'
          from pathlib import Path
          checks = {
              Path('index.html'): [
                  'Часом життя ставить перед нами випробування.',
                  'Знайди в собі ресурс, щоб їх прийняти.',
                  'Кожне випробування — це крок до глибшого пізнання себе й свого призначення.',
                  'У кожній складності прихований урок, у кожній втраті — можливість для нового усвідомлення.',
                  'Відкрий внутрішнє джерело, яке веде тебе вперед, і пам’ятай: справжня сила народжується не лише в перемогах, а й у здатності зберігати віру, любов і гармонію навіть у найважчі моменти.',
              ],
              Path('ru/index.html'): [
                  'Порой жизнь ставит перед нами испытания.',
                  'Найди в себе ресурс, чтобы их принять.',
                  'Каждое испытание — это шаг к более глубокому познанию себя и своего предназначения.',
                  'В каждой трудности скрыт урок, в каждой потере — возможность для нового осознания.',
                  'Открой внутренний источник, который ведёт тебя вперёд, и помни: настоящая сила рождается не только в победах, но и в способности сохранять веру, любовь и гармонию даже в самые трудные моменты.',
              ],
          }
          for path, fragments in checks.items():
              text = path.read_text(encoding='utf-8')
              positions = [text.index(fragment) for fragment in fragments]
              assert positions == sorted(positions), f'Wrong quote order in {path}'
              assert text.count('editorial-quote editorial-quote--author') == 1, f'Unexpected quote block count in {path}'
          print('Final bilingual quote validation: OK')
          PY

      - name: Commit updated homepages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html ru/index.html
          git diff --cached --quiet && exit 0
          git commit -m "Apply final approved bilingual author quote"
          git push origin HEAD:content/final-author-quote-v3-4
