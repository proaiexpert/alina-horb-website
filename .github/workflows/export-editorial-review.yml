name: Export editorial review sources

on:
  push:
    branches:
      - feature/v32-notes-hub
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: feature/v32-notes-hub

      - name: Collect bilingual article sources
        run: |
          set -euo pipefail
          mkdir -p editorial-review-source/ua editorial-review-source/ru
          cp notes/first-consultation/index.html editorial-review-source/ua/01-first-consultation.html
          cp notes/how-to-start-the-conversation/index.html editorial-review-source/ua/02-start-conversation.html
          cp notes/when-coping-stops-helping/index.html editorial-review-source/ua/03-coping-support.html
          cp notes/stress-relocation-and-lost-support/index.html editorial-review-source/ua/04-relocation.html
          cp ru/notes/first-consultation/index.html editorial-review-source/ru/01-first-consultation.html
          cp ru/notes/how-to-start-the-conversation/index.html editorial-review-source/ru/02-start-conversation.html
          cp ru/notes/when-coping-stops-helping/index.html editorial-review-source/ru/03-coping-support.html
          cp ru/notes/stress-relocation-and-lost-support/index.html editorial-review-source/ru/04-relocation.html

      - name: Upload editorial review sources
        uses: actions/upload-artifact@v4
        with:
          name: alina-editorial-review-source
          path: editorial-review-source
          if-no-files-found: error
