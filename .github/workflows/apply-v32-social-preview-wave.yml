name: Apply V3.2 social preview wave

on:
  push:
    branches:
      - fix/v32-bilingual-social-previews
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: fix/v32-bilingual-social-previews
          fetch-depth: 0

      - name: Install image tooling
        run: python3 -m pip install --disable-pip-version-check Pillow==11.3.0

      - name: Generate cards and apply approved content
        run: python3 scripts/apply-v32-social-preview-wave.py

      - name: Validate generated output
        run: python3 scripts/validate-social-previews.py

      - name: Upload generated cards for visual review
        uses: actions/upload-artifact@v4
        with:
          name: v32-social-preview-cards
          path: |
            assets/images/social/alina-horb-og-ua-v1.jpg
            assets/images/social/alina-horb-og-ru-v1.jpg
          if-no-files-found: error

      - name: Commit generated production files
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html ru/index.html assets/images/social
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
            exit 0
          fi
          git commit -m "Implement bilingual social previews and final Hero copy"
          git push origin HEAD:fix/v32-bilingual-social-previews
